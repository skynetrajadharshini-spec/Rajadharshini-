<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V. Rajadharshini | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>

        /* ============ RESET & BASE ============ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root{
            --night-deep:   #0b1426;
            --night-mid:    #142342;
            --night-soft:   #1f3358;
            --rain-blue:    #7fb6d9;
            --frost:        #e8f1fb;
            --heart-pink:   #ff8fa8;
            --heart-glow:   #ffc1d3;
            --gold:         #ffd9a0;
            --bubble-edge:  rgba(196, 228, 255, 0.65);
            --bubble-fill:  rgba(196, 228, 255, 0.10);
        }

        html{ scroll-behavior: smooth; }

        body{
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(180deg, var(--night-deep) 0%, var(--night-mid) 45%, var(--night-soft) 100%);
            color: var(--frost);
            overflow-x: hidden;
            position: relative;
        }

        h1, h2, h3{
            font-family: 'Playfair Display', serif;
        }

        @media (prefers-reduced-motion: reduce){
            *{ animation: none !important; transition: none !important; }
        }

        /* ============ INTRO OVERLAY ============ */
        #intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--night-deep);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        #intro-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .intro-ring {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 28px;
        }

        .intro-ring svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .intro-ring .track {
            fill: none;
            stroke: rgba(127, 182, 217, 0.15);
            stroke-width: 3;
        }

        .intro-ring .progress {
            fill: none;
            stroke: url(#introGrad);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            animation: introSpin 2.2s cubic-bezier(0.25, 0.1, 0.15, 1) forwards;
        }

        @keyframes introSpin {
            0% { stroke-dashoffset: 283; }
            100% { stroke-dashoffset: 0; }
        }

        .intro-logo {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(100deg, var(--frost), var(--rain-blue) 60%, var(--heart-glow));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0;
            animation: introFade 0.6s ease 0.5s forwards;
        }

        .intro-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--frost);
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0;
            animation: introFade 0.6s ease 0.8s forwards;
        }

        .intro-sub {
            font-size: 0.75rem;
            color: var(--rain-blue);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 8px;
            opacity: 0;
            animation: introFade 0.6s ease 1.1s forwards;
        }

        .intro-dots {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            opacity: 0;
            animation: introFade 0.6s ease 1.4s forwards;
        }

        .intro-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--rain-blue);
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .intro-dots span:nth-child(2) { animation-delay: 0.2s; }
        .intro-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes introFade {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ============ ATMOSPHERE: RAIN + HEARTS + STARS ============ */

        #sky{
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star{
            position: absolute;
            width: 2px; height: 2px;
            background: var(--frost);
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 3.5s ease-in-out infinite;
        }

        @keyframes twinkle{
            0%, 100%{ opacity: 0.15; }
            50%{ opacity: 0.9; }
        }

        .raindrop{
            position: absolute;
            top: -10%;
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, transparent, var(--rain-blue), transparent);
            opacity: 0.45;
            animation: fall linear infinite;
        }

        @keyframes fall{
            to{ transform: translateY(120vh); }
        }

        .bubble{
            position: absolute;
            bottom: -10%;
            border-radius: 50%;
            background: var(--bubble-fill);
            border: 1px solid var(--bubble-edge);
            box-shadow: inset 0 0 8px rgba(255,255,255,0.25), 0 0 6px rgba(196,228,255,0.25);
            opacity: 0.8;
            animation: bubbleRise linear infinite, bubbleSway ease-in-out infinite;
            user-select: none;
        }

        @keyframes bubbleRise{
            to{ transform: translateY(-115vh); }
        }

        @keyframes bubbleSway{
            0%, 100%{ margin-left: 0px; }
            50%{ margin-left: 26px; }
        }

        /* ============ LAYOUT WRAP ============ */

        .wrap{
            position: relative;
            z-index: 1;
        }

        section{
            padding: 90px 8vw;
            max-width: 1100px;
            margin: 0 auto;
        }

        .glass{
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 18px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.35);
        }

        .eyebrow{
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.75rem;
            color: var(--rain-blue);
            margin-bottom: 10px;
            display: block;
        }

        /* ============ HERO ============ */

        .hero{
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 0 8vw;
            position: relative;
        }

        .hero-photo-wrap{
            position: relative;
            width: 132px;
            height: 132px;
            margin-bottom: 26px;
            opacity: 0;
            animation: riseIn 1s ease-out 0s forwards, photoFloat 5s ease-in-out 1s infinite;
        }

        .hero-photo-wrap::before{
            content: "";
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--rain-blue), var(--heart-pink));
            opacity: 0.55;
            filter: blur(10px);
            z-index: 0;
        }

        .hero-photo{
            position: relative;
            z-index: 1;
            width: 132px;
            height: 132px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(232,241,251,0.85);
            box-shadow: 0 10px 28px rgba(0,0,0,0.45);
        }

        @keyframes photoFloat{
            0%, 100%{ transform: translateY(0); }
            50%{ transform: translateY(-7px); }
        }

        .hero-tag{
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--heart-glow);
            margin-bottom: 18px;
            opacity: 0;
            animation: riseIn 1s ease-out 0.2s forwards;
        }

        .hero h1{
            font-size: clamp(2.6rem, 7vw, 5.2rem);
            font-weight: 700;
            line-height: 1.05;
            background: linear-gradient(100deg, var(--frost), var(--rain-blue) 60%, var(--heart-glow));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0;
            animation: riseIn 1s ease-out 0.4s forwards;
        }

        .hero-name-row{
            display: flex;
            align-items: flex-start;
            gap: 8px;
            flex-wrap: wrap;
        }

        .hero p.role{
            font-size: 1.2rem;
            margin-top: 18px;
            color: var(--frost);
            opacity: 0;
            animation: riseIn 1s ease-out 0.6s forwards;
        }

        .hero p.tagline{
            margin-top: 14px;
            max-width: 540px;
            color: #c9d6ea;
            font-size: 1rem;
            line-height: 1.6;
            opacity: 0;
            animation: riseIn 1s ease-out 0.8s forwards;
        }

        .scroll-hint{
            position: absolute;
            bottom: 40px;
            left: 8vw;
            font-size: 0.8rem;
            color: var(--rain-blue);
            opacity: 0;
            animation: riseIn 1s ease-out 1.1s forwards, bob 2.5s ease-in-out 1.6s infinite;
        }

        @keyframes riseIn{
            from{ opacity: 0; transform: translateY(24px); }
            to{ opacity: 1; transform: translateY(0); }
        }

        @keyframes bob{
            0%, 100%{ transform: translateY(0); }
            50%{ transform: translateY(8px); }
        }

        /* ============ REVEAL ON SCROLL ============ */

        .reveal{
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.visible{
            opacity: 1;
            transform: translateY(0);
        }

        /* ============ SECTION TITLES ============ */

        .section-title{
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            margin-bottom: 36px;
            position: relative;
            display: inline-block;
        }

        .section-title::after{
            content: "";
            display: block;
            width: 60px;
            height: 3px;
            margin-top: 12px;
            background: linear-gradient(90deg, var(--heart-pink), var(--rain-blue));
            border-radius: 3px;
        }

        /* ============ ABOUT ============ */

        .about-grid{
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .about-card{
            padding: 34px;
        }

        .about-card p{
            line-height: 1.8;
            color: #d6e2f3;
            font-size: 1.02rem;
        }

        .about-card p + p{ margin-top: 16px; }

        .pill-row{
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 22px;
        }

        .pill{
            padding: 7px 16px;
            border-radius: 999px;
            font-size: 0.82rem;
            background: rgba(127,182,217,0.15);
            border: 1px solid rgba(127,182,217,0.4);
            color: var(--frost);
        }

        .pill.pink{
            background: rgba(255,143,168,0.15);
            border-color: rgba(255,143,168,0.45);
        }

        /* ============ INFO GRID (education / details) ============ */

        .info-grid{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-top: 10px;
        }

        .info-box{
            padding: 22px 24px;
            transition: transform 0.35s ease, box-shadow 0.35s ease;
        }

        .info-box:hover{
            transform: translateY(-6px);
            box-shadow: 0 14px 30px rgba(127,182,217,0.18);
        }

        .info-box .label{
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--rain-blue);
            margin-bottom: 8px;
        }

        .info-box .value{
            font-size: 1.08rem;
            color: var(--frost);
            font-weight: 600;
        }

        /* graduation line — prevent wrapping on mobile */
        .info-box.graduation .value {
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .info-box.graduation .value {
                white-space: nowrap;
                font-size: 0.95rem;
            }
            .info-box.graduation {
                padding: 16px 18px;
            }
        }

        /* ============ SKILLS ============ */

        .skills-grid{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .skill-card{
            padding: 28px 22px;
            text-align: center;
            transition: transform 0.35s ease, border-color 0.35s ease;
        }

        .skill-card:hover{
            transform: translateY(-8px) scale(1.02);
            border-color: var(--heart-pink);
        }

        .skill-icon{
            font-size: 2.1rem;
            margin-bottom: 12px;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float{
            0%, 100%{ transform: translateY(0); }
            50%{ transform: translateY(-8px); }
        }

        .skill-card h3{
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--frost);
        }

        /* ============ PROJECT ============ */

        .project-card{
            padding: 34px;
            position: relative;
            overflow: hidden;
        }

        .project-card::before{
            content: "○";
            position: absolute;
            right: -20px;
            top: -30px;
            font-size: 8rem;
            color: rgba(196,228,255,0.08);
        }

        .project-card .tag{
            display: inline-block;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .project-card h3{
            font-size: 1.6rem;
            margin-bottom: 12px;
        }

        .project-card p{
            color: #d6e2f3;
            line-height: 1.7;
        }

        /* ============ ACHIEVEMENTS ============ */

        .achieve-grid{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .achieve-card{
            padding: 28px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .medal{
            font-size: 2rem;
            flex-shrink: 0;
            animation: pulseGlow 2.4s ease-in-out infinite;
        }

        @keyframes pulseGlow{
            0%, 100%{ filter: drop-shadow(0 0 0px var(--gold)); }
            50%{ filter: drop-shadow(0 0 10px var(--gold)); }
        }

        .achieve-card h3{
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .achieve-card p{
            color: #c9d6ea;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* ============ CONTACT ============ */

        .contact-card{
            padding: 40px;
            text-align: center;
        }

        .contact-card h2{
            margin-bottom: 14px;
        }

        .contact-card p.sub{
            color: #c9d6ea;
            margin-bottom: 30px;
        }

        .contact-links{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
        }

        .contact-links a{
            text-decoration: none;
            color: var(--frost);
            background: rgba(127,182,217,0.12);
            border: 1px solid rgba(127,182,217,0.35);
            padding: 12px 22px;
            border-radius: 999px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .contact-links a:hover{
            background: var(--heart-pink);
            color: var(--night-deep);
            border-color: var(--heart-pink);
            transform: translateY(-4px);
        }

        .contact-links a .insta-icon {
            font-size: 1.1rem;
        }

        footer{
            text-align: center;
            padding: 40px 8vw 60px;
            color: #7c8caf;
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }

        footer span{
            color: var(--heart-pink);
        }

        /* ============ RESPONSIVE ============ */

        @media (max-width: 600px){
            section{ padding: 70px 6vw; }
            .hero{ padding: 0 6vw; }
        }

    </style>
</head>

        <svg style="position:absolute;width:0;height:0;">
            <defs>
                <linearGradient id="introGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#7fb6d9" />
                    <stop offset="50%" stop-color="#ff8fa8" />
                    <stop offset="100%" stop-color="#ffd9a0" />
                </linearGradient>
            </defs>
        </svg>
        <div class="intro-ring">
            <svg viewBox="0 0 100 100">
                <circle class="track" cx="50" cy="50" r="45" />
                <circle class="progress" cx="50" cy="50" r="45" />
            </svg>
            <div class="intro-logo">VR</div>
        </div>
        <div class="intro-name">V. Rajadharshini</div>
        <div class="intro-sub">AI &amp; DS · First Year</div>
        <div class="intro-dots">
            <span></span><span></span><span></span>
        </div>
    </div>
